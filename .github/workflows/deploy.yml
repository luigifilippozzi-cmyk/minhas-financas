# ============================================================
# DEPLOY AUTOMÁTICO — Firebase Hosting
#
# Disparado a cada push na branch main.
#
# CONFIGURAÇÃO NECESSÁRIA (uma única vez no Windows):
# ──────────────────────────────────────────────────
# 1. Abra o Terminal do Windows (PowerShell ou CMD)
# 2. npm install -g firebase-tools
# 3. firebase login
# 4. firebase login:ci
#    → Copia o token exibido (começa com "1//")
# 5. GitHub → Settings → Secrets and variables → Actions
#    → New repository secret
#    → Nome: FIREBASE_TOKEN | Valor: (cole o token)
#
# Após configurar, todo push na main fará deploy automático!
# URL do app: https://minhas-financas-285da.web.app
# ============================================================

name: 🚀 Deploy — Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch: # permite disparar manualmente pela aba Actions

jobs:
  deploy:
    name: Deploy para Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instala Firebase CLI
        run: npm install -g firebase-tools

      - name: 🚀 Deploy no Firebase Hosting + Firestore
        run: |
          firebase deploy --only hosting,firestore \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project minhas-financas-285da \
            --non-interactive

      - name: ✅ Deploy concluído
        run: echo "App publicado em https://minhas-financas-285da.web.app"
