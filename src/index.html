<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    PORTÃO DE ENTRADA — Minhas Finanças
    Esta página SEMPRE faz logout do usuário e redireciona para login.html.
    Garante que acessar a URL raiz do app exige reautenticação.
    O dashboard real está em dashboard.html.
  -->
  <title>Minhas Finanças — Redirecionando…</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4ff;
      font-family: system-ui, sans-serif;
      color: #555;
    }
  </style>
</head>
<body>
  <p>Carregando…</p>

  <script type="module">
    import { auth } from './js/config/firebase.js';
    import { signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // Sempre faz logout e redireciona para a tela de autenticação.
    // Qualquer acesso à URL raiz do app (/) reinicia o fluxo de login.
    signOut(auth).finally(() => {
      window.location.replace('login.html');
    });
  </script>
</body>
</html>
