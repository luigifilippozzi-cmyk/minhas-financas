<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    PORTÃO DE ENTRADA — Minhas Finanças (RF-017)
    Redireciona para o Dashboard se autenticado, ou para Login se não autenticado.
    Não faz mais logout automático — preserva a sessão do usuário.
  -->
  <title>Minhas Finanças — Carregando…</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4ff;
      font-family: system-ui, sans-serif;
      color: #555;
    }
  </style>
</head>
<body>
  <p>Carregando…</p>

  <script type="module">
    import { auth } from './js/config/firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { buscarPerfil } from './js/services/database.js';

    // RF-017: redireciona baseado no estado de autenticação (não faz logout)
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace('login.html');
        return;
      }
      try {
        const perfil = await buscarPerfil(user.uid);
        if (perfil?.grupoId) {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('grupo.html');
        }
      } catch (_) {
        window.location.replace('login.html');
      }
    });
  </script>
</body>
</html>
